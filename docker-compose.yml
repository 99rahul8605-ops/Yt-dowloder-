version: "3.9"

services:
  yt-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-telegram-bot
    restart: unless-stopped

    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - COOKIES_FILE=/app/cookies.txt
      - MAX_SIZE_MB=${MAX_SIZE_MB:-50}
      - ALLOWED_USERS=${ALLOWED_USERS:-}
      - DOWNLOAD_DIR=/tmp/yt_downloads

    volumes:
      # Mount fresh cookies at runtime — overrides the baked-in copy.
      # Make sure this file has actual cookie data (not just comments).
      # Run: bash get_cookies.sh chrome   to regenerate it.
      - ./cookies.txt:/app/cookies.txt:ro

    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
