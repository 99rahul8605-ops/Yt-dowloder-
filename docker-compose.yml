version: "3.9"

services:
  yt-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-telegram-bot
    restart: unless-stopped

    environment:
      # ── Required ────────────────────────────────────────────────────────────
      - BOT_TOKEN=${BOT_TOKEN}

      # ── Optional ────────────────────────────────────────────────────────────
      # Path inside the container where cookies.txt is mounted
      - COOKIES_FILE=/app/cookies.txt

      # Maximum file size (MB) that can be sent via Telegram Bot API (hard limit = 50)
      - MAX_SIZE_MB=${MAX_SIZE_MB:-50}

      # Comma-separated Telegram user IDs allowed to use the bot.
      # Leave empty (or omit) to allow everyone.
      - ALLOWED_USERS=${ALLOWED_USERS:-}

      # Temporary download directory (inside the container)
      - DOWNLOAD_DIR=/tmp/yt_downloads

    volumes:
      # Mount your Netscape-format cookies file (export via browser extension)
      - ./cookies.txt:/app/cookies.txt:ro

      # Optional: persist downloads between restarts (useful for debugging)
      # - ./downloads:/tmp/yt_downloads

    # Resource limits — tune as needed
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
