services:
  - type: web               # web so Render binds the port and passes health checks
    name: yt-telegram-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter

    healthCheckPath: /health  # Flask responds 200 here

    envVars:
      - key: BOT_TOKEN
        sync: false           # set in Render dashboard

      - key: COOKIES_FILE
        value: /app/cookies.txt

      - key: MAX_SIZE_MB
        value: "50"

      - key: ALLOWED_USERS
        value: ""

      - key: DOWNLOAD_DIR
        value: /tmp/yt_downloads

      # Render sets PORT automatically — Flask reads it
      - key: PORT
        fromService:
          type: web
          name: yt-telegram-bot
          property: port
